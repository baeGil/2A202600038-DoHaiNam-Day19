services:
  neo4j:
    image: ${NEO4J_IMAGE:-neo4j:5-community}
    pull_policy: never
    container_name: graph-rag-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_plugins:/plugins

  etcd:
    image: ${ETCD_IMAGE:-quay.io/coreos/etcd:v3.5.5}
    container_name: graph-rag-etcd
    restart: unless-stopped
    environment:
      ETCD_AUTO_COMPACTION_MODE: ${ETCD_AUTO_COMPACTION_MODE:-revision}
      ETCD_AUTO_COMPACTION_RETENTION: ${ETCD_AUTO_COMPACTION_RETENTION:-1000}
      ETCD_QUOTA_BACKEND_BYTES: ${ETCD_QUOTA_BACKEND_BYTES:-4294967296}
      ETCD_SNAPSHOT_COUNT: ${ETCD_SNAPSHOT_COUNT:-50000}
    command:
      - etcd
      - -advertise-client-urls=http://etcd:2379
      - -listen-client-urls=http://0.0.0.0:2379
      - -data-dir
      - /etcd
    volumes:
      - etcd_data:/etcd

  minio:
    image: ${MINIO_IMAGE:-minio/minio:RELEASE.2023-07-07T07-13-57Z}
    container_name: graph-rag-minio
    restart: unless-stopped
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin123}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    command: minio server /minio_data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/minio_data

  milvus:
    image: ${MILVUS_IMAGE:-milvusdb/milvus:v2.5.14}
    container_name: graph-rag-milvus
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin123}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      COMMON_STORAGETYPE: local
      MILVUS_LOG_LEVEL: ${MILVUS_LOG_LEVEL:-info}
    depends_on:
      - etcd
      - minio
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus_data:/var/lib/milvus

  attu:
    image: ${ATTU_IMAGE:-zilliz/attu:v2.5.10}
    container_name: graph-rag-attu
    restart: unless-stopped
    environment:
      MILVUS_ADDRESS: milvus:19530
      MILVUS_SERVERS: milvus:19530
      MILVUS_DATABASE: ${MILVUS_DATABASE:-default}
    depends_on:
      - milvus
    ports:
      - "${ATTU_PORT:-3000}:3000"
    volumes:
      - attu_data:/data

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  neo4j_plugins:
  etcd_data:
  minio_data:
  milvus_data:
  attu_data:
